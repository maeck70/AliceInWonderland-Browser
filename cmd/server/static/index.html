<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice in Wonderland Graph Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0a1b 0%, #1a102f 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f0f7;
            --text-secondary: #a99fc2;
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.4);
            --accent-hover: #b5179e;
            --highlight-bg: rgba(247, 37, 133, 0.2);
            --highlight-border: rgba(247, 37, 133, 0.6);
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(13, 10, 27, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #e0aaff, #9d4edd, #ff70a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            background: rgba(13, 10, 27, 0.2);
        }

        .search-container {
            padding: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .character-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .character-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--panel-bg);
            border: 1px solid transparent;
        }

        .character-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .character-item.active {
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.15) 0%, rgba(181, 23, 158, 0.05) 100%);
            border-color: rgba(157, 78, 221, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .character-item.active .char-name {
            color: #fff;
            font-weight: 600;
        }

        .character-item.active .appearance-badge {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .char-name {
            font-size: 1rem;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .appearance-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-weight: 600;
            transition: all 0.2s;
        }

        /* Main view styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
        }

        .content-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-header h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .stats-badge {
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        .stats-badge span {
            color: var(--accent);
            font-weight: 700;
        }

        .paragraphs-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .no-selection svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            stroke: rgba(255, 255, 255, 0.1);
        }

        .no-selection p {
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.5;
        }

        .paragraph-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .paragraph-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .paragraph-meta {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .paragraph-meta::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--panel-border);
        }

        .highlight {
            background: var(--highlight-bg);
            border-bottom: 2px solid var(--highlight-border);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.4);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Alice in Wonderland</h1>
            <div class="subtitle">Neo4j Graph Database Browser</div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="search-container">
                <input type="text" class="search-input" id="search" placeholder="Search characters...">
            </div>
            <div class="character-list" id="char-list">
                <!-- Dynamic Character List -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="main-view">
            <div class="no-selection" id="no-sel-view">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.97 5.97 0 00-.75-2.906m-.173-4.059a3.5 3.5 0 11-4.835-4.836A3.5 3.5 0 008 7.5a3.5 3.5 0 10-4.836 4.835m1.838 5.76c-.575-.561-1.111-1.21-1.598-1.94M3 13a9 9 0 018.666-8.986m.037.666A11.944 11.944 0 0112 3c2.17 0 4.207.576 5.963 1.584A6.06 6.06 0 0118 6M4 18h12M4 14h12" />
                </svg>
                <h2>Choose a Character</h2>
                <p>Select an individual from the left panel to browse all the paragraphs in the book where they make an appearance.</p>
            </div>

            <!-- Active Selection View (Hidden initially) -->
            <div id="active-view" style="display: none; flex-direction: column; flex: 1; overflow: hidden;">
                <div class="content-header">
                    <h2 id="selected-char-name">Character Name</h2>
                    <div class="stats-badge">Appears in <span id="selected-char-count">0</span> paragraphs</div>
                </div>
                <div class="paragraphs-container" id="paragraphs-list">
                    <!-- Dynamic Paragraph Cards -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCharacters = [];
        let selectedCharacter = null;
        let characterAliases = {};

        // Hardcode aliases locally for high-fidelity text highlighting in UI
        const characterRules = {
            "Alice": ["Alice"],
            "White Rabbit": ["White Rabbit", "Rabbit"],
            "Mouse": ["Mouse"],
            "Dodo": ["Dodo"],
            "Lory": ["Lory"],
            "Eaglet": ["Eaglet"],
            "Duck": ["Duck"],
            "Pat": ["Pat"],
            "Bill": ["Bill"],
            "Puppy": ["Puppy"],
            "Caterpillar": ["Caterpillar"],
            "Duchess": ["Duchess"],
            "Cheshire Cat": ["Cheshire Cat", "Cheshire", "Cat"],
            "March Hare": ["March Hare", "Hare"],
            "Hatter": ["Hatter", "Mad Hatter"],
            "Dormouse": ["Dormouse"],
            "Queen of Hearts": ["Queen of Hearts", "Queen"],
            "King of Hearts": ["King of Hearts", "King"],
            "Knave of Hearts": ["Knave of Hearts", "Knave"],
            "Gryphon": ["Gryphon"],
            "Mock Turtle": ["Mock Turtle", "Turtle"],
            "Dinah": ["Dinah"],
            "Elsie": ["Elsie"],
            "Lacie": ["Lacie"],
            "Tillie": ["Tillie"],
            "Mary Ann": ["Mary Ann"],
            "Cook": ["Cook"],
            "Frog-Footman": ["Frog-Footman", "Frog"],
            "Fish-Footman": ["Fish-Footman", "Fish"],
            "Pigeon": ["Pigeon"],
            "Alice's Sister": ["sister", "Sister"]
        };

        // Fetch characters on load
        async function fetchCharacters() {
            try {
                const res = await fetch('/api/characters');
                allCharacters = await res.json();
                renderCharacters(allCharacters);
            } catch (err) {
                console.error("Failed to fetch characters:", err);
            }
        }

        // Render character list in sidebar
        function renderCharacters(list) {
            const container = document.getElementById('char-list');
            container.innerHTML = '';
            
            list.forEach(char => {
                const item = document.createElement('div');
                item.className = 'character-item';
                if (selectedCharacter && selectedCharacter.name === char.name) {
                    item.className += ' active';
                }
                
                item.innerHTML = `
                    <span class="char-name">${char.name}</span>
                    <span class="appearance-badge">${char.appearances}</span>
                `;
                
                item.addEventListener('click', () => selectCharacter(char));
                container.appendChild(item);
            });
        }

        // Handle search filtering
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allCharacters.filter(char => 
                char.name.toLowerCase().includes(query)
            );
            renderCharacters(filtered);
        });

        // Select character and fetch appearances
        async function selectCharacter(char) {
            selectedCharacter = char;
            
            // Highlight active sidebar item
            const items = document.querySelectorAll('.character-item');
            items.forEach(item => {
                const name = item.querySelector('.char-name').innerText;
                if (name === char.name) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // Switch views
            document.getElementById('no-sel-view').style.display = 'none';
            document.getElementById('active-view').style.display = 'flex';
            
            document.getElementById('selected-char-name').innerText = char.name;
            document.getElementById('selected-char-count').innerText = char.appearances;

            const listContainer = document.getElementById('paragraphs-list');
            listContainer.innerHTML = '<div style="color: var(--text-secondary);">Loading...</div>';

            try {
                const res = await fetch(`/api/paragraphs?character=${encodeURIComponent(char.name)}`);
                const paragraphs = await res.json();
                renderParagraphs(paragraphs, char.name);
            } catch (err) {
                listContainer.innerHTML = '<div style="color: #ff70a6;">Error loading paragraphs.</div>';
                console.error(err);
            }
        }

        // Render paragraph cards with highlighted terms
        function renderParagraphs(paragraphs, charName) {
            const container = document.getElementById('paragraphs-list');
            container.innerHTML = '';
            
            if (paragraphs.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary);">No appearances found.</div>';
                return;
            }

            const aliases = characterRules[charName] || [charName];

            paragraphs.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'paragraph-card';
                card.style.animationDelay = `${index * 0.05}s`;

                // Highlight occurrences in text
                let highlightedText = p.text;
                
                // Sort aliases by length descending so longer phrases match first
                const sortedAliases = [...aliases].sort((a, b) => b.length - a.length);
                
                sortedAliases.forEach(alias => {
                    const isSister = alias.toLowerCase() === 'sister';
                    // Create regex with word boundaries
                    const flags = isSister ? 'gi' : 'g';
                    const regex = new RegExp(`\\b(${escapeRegex(alias)})\\b`, flags);
                    highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
                });

                card.innerHTML = `
                    <div class="paragraph-meta">Paragraph #${p.number}</div>
                    <div>${highlightedText}</div>
                `;
                
                container.appendChild(card);
            });
            container.scrollTop = 0;
        }

        function escapeRegex(string) {
            return string.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        }

        // Initialize
        fetchCharacters();
    </script>
</body>
</html>
