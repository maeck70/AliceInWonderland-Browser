<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice in Wonderland Graph Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0a1b 0%, #1a102f 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f0f7;
            --text-secondary: #a99fc2;
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.4);
            --accent-hover: #b5179e;
            --location-accent: #2ec4b6;
            --location-glow: rgba(46, 196, 182, 0.4);
            --highlight-bg: rgba(247, 37, 133, 0.2);
            --highlight-border: rgba(247, 37, 133, 0.6);
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(13, 10, 27, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #e0aaff, #9d4edd, #ff70a6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 360px;
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            background: rgba(13, 10, 27, 0.2);
        }

        .tabs-container {
            display: flex;
            border-bottom: 1px solid var(--panel-border);
            padding: 10px 20px 0 20px;
            gap: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            border-radius: 4px 4px 0 0;
            box-shadow: 0 -2px 10px var(--accent-glow);
        }

        .tab-btn.tab-locations.active::after {
            background: var(--location-accent);
            box-shadow: 0 -2px 10px var(--location-glow);
        }

        .search-container {
            padding: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .tab-locations-active .search-input:focus {
            border-color: var(--location-accent);
            box-shadow: 0 0 10px var(--location-glow);
        }

        .list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--panel-bg);
            border: 1px solid transparent;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .list-item.active {
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.15) 0%, rgba(181, 23, 158, 0.05) 100%);
            border-color: rgba(157, 78, 221, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .tab-locations-active .list-item.active {
            background: linear-gradient(135deg, rgba(46, 196, 182, 0.15) 0%, rgba(46, 196, 182, 0.03) 100%);
            border-color: rgba(46, 196, 182, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .list-item.active .item-name {
            color: #fff;
            font-weight: 600;
        }

        .list-item.active .badge {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .tab-locations-active .list-item.active .badge {
            background: var(--location-accent);
            box-shadow: 0 0 10px var(--location-glow);
        }

        .item-name {
            font-size: 1rem;
            color: var(--text-primary);
            transition: color 0.2s;
        }

        .badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-weight: 600;
            transition: all 0.2s;
        }

        /* Main view styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
        }

        .content-header {
            padding: 30px 40px 20px 40px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-header h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .stats-badge {
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        .stats-badge span {
            color: var(--accent);
            font-weight: 700;
        }

        .header-location-active .stats-badge span {
            color: var(--location-accent);
        }

        /* Relationship connections layout */
        .connections-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .connections-label {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-display);
            font-weight: 500;
        }

        .pill:hover {
            border-color: var(--accent);
            background: rgba(157, 78, 221, 0.1);
            color: #fff;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.2);
        }

        .pill.pill-location:hover {
            border-color: var(--location-accent);
            background: rgba(46, 196, 182, 0.1);
            box-shadow: 0 0 10px rgba(46, 196, 182, 0.2);
        }

        .paragraphs-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
        }

        .no-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .no-selection svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            stroke: rgba(255, 255, 255, 0.1);
        }

        .no-selection p {
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.5;
        }

        .paragraph-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .paragraph-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .paragraph-meta {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-location-active + .paragraphs-container .paragraph-meta {
            color: var(--location-accent);
        }

        .paragraph-meta::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--panel-border);
        }

        .highlight {
            background: var(--highlight-bg);
            border-bottom: 2px solid var(--highlight-border);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.4);
        }

        .highlight-secondary {
            background: rgba(255, 112, 166, 0.25);
            border-bottom: 2px solid rgba(255, 112, 166, 0.7);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 112, 166, 0.4);
        }

        .highlight-location {
            background: rgba(46, 196, 182, 0.2);
            border-bottom: 2px solid rgba(46, 196, 182, 0.6);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 0 10px rgba(46, 196, 182, 0.4);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Alice in Wonderland</h1>
            <div class="subtitle">Neo4j Graph Database Browser</div>
        </div>
    </header>

    <div class="container" id="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="tabs-container">
                <button class="tab-btn active tab-characters" id="tab-chars-btn">Characters</button>
                <button class="tab-btn tab-locations" id="tab-locs-btn">Settings</button>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search" placeholder="Search characters...">
            </div>
            <div class="list-wrapper" id="list-container">
                <!-- Dynamic List Items -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="main-view">
            <div class="no-selection" id="no-sel-view">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.97 5.97 0 00-.75-2.906m-.173-4.059a3.5 3.5 0 11-4.835-4.836A3.5 3.5 0 008 7.5a3.5 3.5 0 10-4.836 4.835m1.838 5.76c-.575-.561-1.111-1.21-1.598-1.94M3 13a9 9 0 018.666-8.986m.037.666A11.944 11.944 0 0112 3c2.17 0 4.207.576 5.963 1.584A6.06 6.06 0 0118 6M4 18h12M4 14h12" />
                </svg>
                <h2>Choose a Character or Setting</h2>
                <p>Select an item from the left panel to browse all the paragraphs in the book where they make an appearance.</p>
            </div>

            <!-- Active Selection View -->
            <div id="active-view" style="display: none; flex-direction: column; flex: 1; overflow: hidden;">
                <div class="content-header" id="header-panel">
                    <div class="header-top">
                        <h2 id="selected-title">Item Name</h2>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <button id="reset-shared-btn" class="pill" style="display: none; border-color: var(--highlight-border); color: #fff; background: rgba(247,37,133,0.15); margin: 0; padding: 6px 12px;">Show All Appearances</button>
                            <div class="stats-badge" id="stats-badge-container">Appears in <span id="selected-count">0</span> paragraphs</div>
                        </div>
                    </div>
                    <div class="connections-panel" id="locations-panel" style="display: none; margin-top: 8px;">
                        <span class="connections-label">Locations Visited</span>
                        <div class="pills-container" id="locations-pills-list"></div>
                    </div>
                    <div class="connections-panel" id="characters-panel" style="display: none; margin-top: 8px;">
                        <span class="connections-label" id="characters-panel-label">Shared Locations With</span>
                        <div class="pills-container" id="characters-pills-list"></div>
                    </div>
                </div>
                <div class="paragraphs-container" id="paragraphs-list">
                    <!-- Dynamic Paragraph Cards -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'characters'; // 'characters' or 'locations'
        let allCharacters = [];
        let allLocations = [];
        let selectedItem = null;

        // Casing and alias mapping rules for text highlighting in UI
        const characterRules = {
            "Alice": ["Alice"],
            "White Rabbit": ["White Rabbit", "Rabbit"],
            "Mouse": ["Mouse"],
            "Dodo": ["Dodo"],
            "Lory": ["Lory"],
            "Eaglet": ["Eaglet"],
            "Duck": ["Duck"],
            "Pat": ["Pat"],
            "Bill": ["Bill"],
            "Puppy": ["Puppy"],
            "Caterpillar": ["Caterpillar"],
            "Duchess": ["Duchess"],
            "Cheshire Cat": ["Cheshire Cat", "Cheshire", "Cat"],
            "March Hare": ["March Hare", "Hare"],
            "Hatter": ["Hatter", "Mad Hatter"],
            "Dormouse": ["Dormouse"],
            "Queen of Hearts": ["Queen of Hearts", "Queen"],
            "King of Hearts": ["King of Hearts", "King"],
            "Knave of Hearts": ["Knave of Hearts", "Knave"],
            "Gryphon": ["Gryphon"],
            "Mock Turtle": ["Mock Turtle", "Turtle"],
            "Dinah": ["Dinah"],
            "Elsie": ["Elsie"],
            "Lacie": ["Lacie"],
            "Tillie": ["Tillie"],
            "Mary Ann": ["Mary Ann"],
            "Cook": ["Cook"],
            "Frog-Footman": ["Frog-Footman", "Frog"],
            "Fish-Footman": ["Fish-Footman", "Fish"],
            "Pigeon": ["Pigeon"],
            "Alice's Sister": ["sister", "Sister"]
        };

        const locationRules = {
            "The Riverbank": ["riverbank", "river-bank", "lying on the bank", "sitting on the bank", "sitting by her sister on the bank"],
            "The Rabbit Hole": ["rabbit-hole", "rabbit hole"],
            "The Hall of Doors": ["hall of doors", "locked doors", "long hall", "low hall", "the hall"],
            "The Pool of Tears": ["pool of tears", "the pool"],
            "The White Rabbit's House": ["Rabbit's house", "Rabbit's cottage", "house of the Rabbit"],
            "The Mushroom Path": ["mushroom"],
            "The Duchess's House": ["Duchess's house", "Duchess's kitchen", "kitchen"],
            "The March Hare's House": ["March Hare's house", "tea-party", "tea party"],
            "The Queen's Croquet Ground": ["croquet-ground", "croquet ground", "croquet"],
            "The Seaside Shore": ["seaside", "shore", "beach"],
            "The Courtroom": ["court", "courtroom", "trial"]
        };

        // Tab Switching Actions
        const tabCharsBtn = document.getElementById('tab-chars-btn');
        const tabLocsBtn = document.getElementById('tab-locs-btn');
        const appContainer = document.getElementById('app-container');
        const searchInput = document.getElementById('search');

        tabCharsBtn.addEventListener('click', () => switchTab('characters'));
        tabLocsBtn.addEventListener('click', () => switchTab('locations'));

        function switchTab(tab) {
            currentTab = tab;
            searchInput.value = '';
            if (tab === 'characters') {
                tabCharsBtn.classList.add('active');
                tabLocsBtn.classList.remove('active');
                appContainer.classList.remove('tab-locations-active');
                searchInput.placeholder = 'Search characters...';
                renderList(allCharacters);
            } else {
                tabCharsBtn.classList.remove('active');
                tabLocsBtn.classList.add('active');
                appContainer.classList.add('tab-locations-active');
                searchInput.placeholder = 'Search settings...';
                renderList(allLocations);
            }
        }

        // Fetch Initial Data
        async function loadData() {
            try {
                const charRes = await fetch('/api/characters');
                allCharacters = await charRes.json();
                
                const locRes = await fetch('/api/locations');
                allLocations = await locRes.json();
                
                renderList(allCharacters);
            } catch (err) {
                console.error("Failed to load initial data:", err);
            }
        }

        // Render List in Sidebar
        function renderList(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            list.forEach(item => {
                const el = document.createElement('div');
                el.className = 'list-item';
                if (selectedItem && selectedItem.name === item.name) {
                    el.className += ' active';
                }
                
                el.innerHTML = `
                    <span class="item-name">${item.name}</span>
                    <span class="badge">${item.appearances}</span>
                `;
                
                el.addEventListener('click', () => selectItem(item, currentTab));
                container.appendChild(el);
            });
        }

        // Handle Search Filtering
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const list = currentTab === 'characters' ? allCharacters : allLocations;
            const filtered = list.filter(item => 
                item.name.toLowerCase().includes(query)
            );
            renderList(filtered);
        });

        let isSharedMode = false;
        let mainCharacter = "";
        let secondCharacter = "";

        // Reset button listener
        document.getElementById('reset-shared-btn').addEventListener('click', () => {
            if (selectedItem) {
                selectItem(selectedItem, 'characters');
            }
        });

        // Select Character or Location
        async function selectItem(item, type) {
            selectedItem = item;
            isSharedMode = false;
            document.getElementById('reset-shared-btn').style.display = 'none';
            
            // Highlight active sidebar item
            const elements = document.querySelectorAll('.list-item');
            elements.forEach(el => {
                const name = el.querySelector('.item-name').innerText;
                if (name === item.name) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });

            // Adjust main container header theme class
            const headerPanel = document.getElementById('header-panel');
            if (type === 'locations') {
                headerPanel.classList.add('header-location-active');
            } else {
                headerPanel.classList.remove('header-location-active');
            }

            // Switch view
            document.getElementById('no-sel-view').style.display = 'none';
            document.getElementById('active-view').style.display = 'flex';
            
            document.getElementById('selected-title').innerText = item.name;
            document.getElementById('selected-count').innerText = item.appearances;

            // Fetch related paragraphs
            const paragraphsList = document.getElementById('paragraphs-list');
            paragraphsList.innerHTML = '<div style="color: var(--text-secondary);">Loading paragraphs...</div>';

            const queryParam = type === 'characters' ? 'character' : 'location';
            
            try {
                if (type === 'characters') {
                    document.getElementById('locations-panel').style.display = 'block';
                    document.getElementById('characters-panel').style.display = 'block';
                    document.getElementById('characters-panel-label').innerText = 'Shared Locations With';

                    // Parallel fetch: paragraphs + visited locations + met characters
                    const pReq = fetch(`/api/paragraphs?character=${encodeURIComponent(item.name)}`);
                    const locReq = fetch(`/api/character-locations?character=${encodeURIComponent(item.name)}`);
                    const charReq = fetch(`/api/character-interactions?character=${encodeURIComponent(item.name)}`);

                    const [pRes, locRes, charRes] = await Promise.all([pReq, locReq, charReq]);
                    const paragraphs = await pRes.json();
                    const locations = await locRes.json();
                    const metCharacters = await charRes.json();

                    renderLocationsPills(locations);
                    renderCharactersPills(metCharacters, true);
                    renderParagraphs(paragraphs, item.name, 'characters');
                } else {
                    document.getElementById('locations-panel').style.display = 'none';
                    document.getElementById('characters-panel').style.display = 'block';
                    document.getElementById('characters-panel-label').innerText = 'Visiting Characters';

                    // Parallel fetch: paragraphs + visiting characters
                    const pReq = fetch(`/api/paragraphs?location=${encodeURIComponent(item.name)}`);
                    const charReq = fetch(`/api/location-characters?location=${encodeURIComponent(item.name)}`);

                    const [pRes, charRes] = await Promise.all([pReq, charReq]);
                    const paragraphs = await pRes.json();
                    const visitingCharacters = await charRes.json();

                    renderCharactersPills(visitingCharacters, false);
                    renderParagraphs(paragraphs, item.name, 'locations');
                }
            } catch (err) {
                paragraphsList.innerHTML = '<div style="color: #ff70a6;">Error loading data.</div>';
                console.error(err);
            }
        }

        // Render Location Pills
        function renderLocationsPills(locations) {
            const container = document.getElementById('locations-pills-list');
            container.innerHTML = '';
            if (locations.length === 0) {
                container.innerHTML = '<span style="font-size: 0.85rem; color: var(--text-secondary);">No locations mapped.</span>';
                return;
            }
            locations.forEach(locName => {
                const pill = document.createElement('div');
                pill.className = 'pill pill-location';
                pill.innerText = locName;
                pill.addEventListener('click', () => jumpTo('locations', locName));
                container.appendChild(pill);
            });
        }

        // Render Character Pills (Shared Locations or Visiting)
        function renderCharactersPills(chars, isInteractions) {
            const container = document.getElementById('characters-pills-list');
            container.innerHTML = '';
            if (chars.length === 0) {
                container.innerHTML = '<span style="font-size: 0.85rem; color: var(--text-secondary);">No characters mapped.</span>';
                return;
            }
            chars.forEach(charName => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.innerText = charName;
                if (isInteractions) {
                    pill.addEventListener('click', () => enterSharedMode(selectedItem.name, charName));
                } else {
                    pill.addEventListener('click', () => jumpTo('characters', charName));
                }
                container.appendChild(pill);
            });
        }

        // Enter Shared Character Mode
        async function enterSharedMode(char1, char2) {
            isSharedMode = true;
            mainCharacter = char1;
            secondCharacter = char2;

            document.getElementById('reset-shared-btn').style.display = 'block';
            document.getElementById('selected-title').innerText = `${char1} & ${char2}`;

            const paragraphsList = document.getElementById('paragraphs-list');
            paragraphsList.innerHTML = '<div style="color: var(--text-secondary);">Loading shared paragraphs...</div>';

            try {
                const res = await fetch(`/api/shared-paragraphs?char1=${encodeURIComponent(char1)}&char2=${encodeURIComponent(char2)}`);
                const paragraphs = await res.json();
                
                document.getElementById('selected-count').innerText = paragraphs.length;
                renderParagraphs(paragraphs, char1, 'characters');
            } catch (err) {
                paragraphsList.innerHTML = '<div style="color: #ff70a6;">Error loading shared paragraphs.</div>';
                console.error(err);
            }
        }

        // Handle Cross-Linking Navigation jumps
        function jumpTo(tab, itemName) {
            switchTab(tab);
            const list = tab === 'characters' ? allCharacters : allLocations;
            const match = list.find(item => item.name === itemName);
            if (match) {
                selectItem(match, tab);
            }
        }

        // Render Paragraphs and highlight keywords
        function renderParagraphs(paragraphs, activeName, type) {
            const container = document.getElementById('paragraphs-list');
            container.innerHTML = '';
            
            if (paragraphs.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary);">No paragraphs found.</div>';
                return;
            }

            paragraphs.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'paragraph-card';
                card.style.animationDelay = `${index * 0.05}s`;

                let highlightedText = p.text;
                let metaText = `Paragraph #${p.number}`;

                if (type === 'characters') {
                    if (isSharedMode) {
                        if (p.location) {
                            metaText += ` (at ${p.location})`;
                        }
                        
                        // Highlight main character (violet)
                        const mainAliases = characterRules[mainCharacter] || [mainCharacter];
                        const sortedMain = [...mainAliases].sort((a, b) => b.length - a.length);
                        sortedMain.forEach(alias => {
                            const isSister = alias.toLowerCase() === 'sister';
                            const flags = isSister ? 'gi' : 'g';
                            const regex = new RegExp(`\\b(${escapeRegex(alias)})\\b`, flags);
                            highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
                        });

                        // Highlight second character (pink/orange: highlight-secondary)
                        const secondAliases = characterRules[secondCharacter] || [secondCharacter];
                        const sortedSecond = [...secondAliases].sort((a, b) => b.length - a.length);
                        sortedSecond.forEach(alias => {
                            const isSister = alias.toLowerCase() === 'sister';
                            const flags = isSister ? 'gi' : 'g';
                            const regex = new RegExp(`\\b(${escapeRegex(alias)})\\b`, flags);
                            highlightedText = highlightedText.replace(regex, '<span class="highlight-secondary">$1</span>');
                        });
                    } else {
                        // Highlight the selected character's aliases
                        const aliases = characterRules[activeName] || [activeName];
                        const sortedAliases = [...aliases].sort((a, b) => b.length - a.length);
                        sortedAliases.forEach(alias => {
                            const isSister = alias.toLowerCase() === 'sister';
                            const flags = isSister ? 'gi' : 'g';
                            const regex = new RegExp(`\\b(${escapeRegex(alias)})\\b`, flags);
                            highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
                        });
                    }
                } else {
                    // Highlight the selected location's aliases
                    const aliases = locationRules[activeName] || [activeName];
                    const sortedAliases = [...aliases].sort((a, b) => b.length - a.length);
                    sortedAliases.forEach(alias => {
                        const regex = new RegExp(`\\b(${escapeRegex(alias)})\\b`, 'gi');
                        highlightedText = highlightedText.replace(regex, '<span class="highlight-location">$1</span>');
                    });
                }

                card.innerHTML = `
                    <div class="paragraph-meta">${metaText}</div>
                    <div>${highlightedText}</div>
                `;
                
                container.appendChild(card);
            });
            container.scrollTop = 0;
        }

        function escapeRegex(string) {
            return string.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
